<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pokemon CP Calculator</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; padding: 0; transition: background 0.2s; }
    body.dark  { background: #080c18; }
    body.light { background: #eef2f7; }
    select option { background: #1e293b; color: #e2e8f0; }
    .tooltip-wrap { position: relative; display: inline-flex; }
    .tooltip-box {
      display: none; position: absolute; right: 0; top: 28px;
      width: 280px; background: #1e293b; border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px; padding: 12px 14px; font-size: 11px; line-height: 1.6;
      color: #94a3b8; z-index: 100; pointer-events: none;
    }
    .light .tooltip-box { background: #fff; border-color: rgba(0,0,0,0.12); color: #475569; }
    .tooltip-wrap:hover .tooltip-box { display: block; }
  </style>
</head>
<body class="dark">
  <div id="root"></div>
  <script type="text/babel">

const REG_PLACEMENTS = [
  { label: "2nd",   cp: 325 },
  { label: "T4",    cp: 300 },
  { label: "T8",    cp: 280 },
  { label: "T16",   cp: 200 },
  { label: "T32",   cp: 160 },
  { label: "T64",   cp: 120 },
  { label: "T128",  cp: 80  },
  { label: "T256",  cp: 60  },
  { label: "T512",  cp: 40  },
  { label: "T1024", cp: 20  },
];

const IC_PLACEMENTS = [
  { label: "T8",    cp: 380 },
  { label: "T16",   cp: 300 },
  { label: "T32",   cp: 240 },
  { label: "T64",   cp: 180 },
  { label: "T128",  cp: 140 },
  { label: "T256",  cp: 100 },
  { label: "T512",  cp: 80  },
  { label: "T1024", cp: 40  },
];

const CUPS = 260;
const TOP_N = 5;
const THRESHOLDS = [760, 740, 720, 700, 680];
const MAX_DISPLAY = 800;

const SUBTITLES = [
  "Enhanced!",
  "Legal in Finland!",
  "Jeepers!",
  "Presented by Ryan R, the worst player who could qualify for worlds.",
  "Smelly edition.",
  "Bending the spoon..",
  "sponsored by little Timmy",
  "Getting to Worlds is kind of hard, huh.",
  "Now with new car smell!",
];

function getThresholdInfo(total) {
  if (total >= 760) return { color: "#4ade80", bg: "rgba(74,222,128,0.08)" };
  if (total >= 740) return { color: "#86efac", bg: "rgba(134,239,172,0.07)" };
  if (total >= 720) return { color: "#facc15", bg: "rgba(250,204,21,0.08)" };
  if (total >= 700) return { color: "#fbbf24", bg: "rgba(251,191,36,0.07)" };
  if (total >= 680) return { color: "#fb923c", bg: "rgba(251,146,60,0.07)" };
  return null;
}

function multisetCombos(vals, k) {
  if (k === 0) return [[]];
  const res = [];
  function gen(start, cur) {
    if (cur.length === k) { res.push([...cur]); return; }
    for (let i = start; i < vals.length; i++) {
      cur.push(vals[i]); gen(i, cur); cur.pop();
    }
  }
  gen(0, []);
  return res;
}

const getPlacements = (type) => type === "ic" ? IC_PLACEMENTS : REG_PLACEMENTS;
const getCP = (type, label) => getPlacements(type).find(p => p.label === label)?.cp ?? 0;
const cpToLabel = (type, cp) => {
  if (cp === 0) return "—";
  return getPlacements(type).find(p => p.cp === cp)?.label ?? "?";
};

let nextId = 6;
const DEFAULT_EVENTS = [
  { id: 0, type: "reg", status: "played",   placement: "T64"  },
  { id: 1, type: "reg", status: "played",   placement: "T1024"},
  { id: 2, type: "reg", status: "played",   placement: "T256" },
  { id: 3, type: "reg", status: "upcoming", placement: null   },
  { id: 4, type: "reg", status: "upcoming", placement: null   },
  { id: 5, type: "ic",  status: "upcoming", placement: null   },
];

function mkTheme(dark) {
  return dark ? {
    pageBg:       "#080c18",
    cardBg:       "rgba(255,255,255,0.025)",
    cardBorder:   "rgba(255,255,255,0.07)",
    cardBorderPlayed: "rgba(255,255,255,0.055)",
    cardBorderUpcoming: "rgba(255,255,255,0.09)",
    text:         "#e2e8f0",
    textMuted:    "#64748b",
    textDim:      "#64748b",
    textSub:      "#94a3b8",
    tableDark:    "rgba(0,0,0,0.12)",
    tableDivider: "rgba(255,255,255,0.1)",
    tableRowBorder: "rgba(255,255,255,0.03)",
    tableHead:    "rgba(255,255,255,0.035)",
    tableHeadBorder: "rgba(255,255,255,0.08)",
    btnInactiveBg: "rgba(255,255,255,0.03)",
    btnInactiveBorder: "rgba(255,255,255,0.08)",
    btnInactiveColor: "#94a3b8",
    cpLabelColor: "#60a5fa",
    resultPanelDefault: "rgba(255,255,255,0.02)",
    resultPanelBorder:  "rgba(255,255,255,0.07)",
    resultTextEmpty:    "#94a3b8",
    selBg:        "rgba(255,255,255,0.05)",
    selBorder:    "rgba(255,255,255,0.1)",
    selColor:     "#cbd5e1",
    addBtnBg:     "rgba(255,255,255,0.015)",
    addBtnBorder: "rgba(255,255,255,0.08)",
    addBtnColor:  "#64748b",
    divider:      "rgba(255,255,255,0.07)",
    noDataColor:  "#475569",
    subTotal:     "#94a3b8",
    top5SumColor: "#94a3b8",
  } : {
    pageBg:       "#eef2f7",
    cardBg:       "#ffffff",
    cardBorder:   "rgba(0,0,0,0.08)",
    cardBorderPlayed: "rgba(0,0,0,0.06)",
    cardBorderUpcoming: "rgba(0,0,0,0.1)",
    text:         "#0f172a",
    textMuted:    "#64748b",
    textDim:      "#94a3b8",
    textSub:      "#475569",
    tableDark:    "rgba(0,0,0,0.04)",
    tableDivider: "rgba(0,0,0,0.12)",
    tableRowBorder: "rgba(0,0,0,0.05)",
    tableHead:    "rgba(0,0,0,0.04)",
    tableHeadBorder: "rgba(0,0,0,0.08)",
    btnInactiveBg: "rgba(0,0,0,0.03)",
    btnInactiveBorder: "rgba(0,0,0,0.1)",
    btnInactiveColor: "#64748b",
    cpLabelColor: "#2563eb",
    resultPanelDefault: "rgba(0,0,0,0.03)",
    resultPanelBorder:  "rgba(0,0,0,0.08)",
    resultTextEmpty:    "#94a3b8",
    selBg:        "#ffffff",
    selBorder:    "rgba(0,0,0,0.15)",
    selColor:     "#0f172a",
    addBtnBg:     "rgba(0,0,0,0.02)",
    addBtnBorder: "rgba(0,0,0,0.1)",
    addBtnColor:  "#94a3b8",
    divider:      "rgba(0,0,0,0.08)",
    noDataColor:  "#94a3b8",
    subTotal:     "#475569",
    top5SumColor: "#64748b",
  };
}

function App() {
  const [dark, setDark] = React.useState(true);
  const T = React.useMemo(() => mkTheme(dark), [dark]);

  React.useEffect(() => {
    document.body.className = dark ? "dark" : "light";
  }, [dark]);

  const [subtitle] = React.useState(() =>
    SUBTITLES[Math.floor(Math.random() * SUBTITLES.length)]
  );

  const [events, setEvents] = React.useState(DEFAULT_EVENTS);
  const [minTotal, setMinTotal] = React.useState(740);
  const [sortDir, setSortDir] = React.useState("asc");
  const [regCapCp, setRegCapCp] = React.useState(null);
  const [icCapCp, setIcCapCp] = React.useState(null);
  const [copyStatus, setCopyStatus] = React.useState("");

  const toggleType = (id) =>
    setEvents(evs => evs.map(e => e.id === id
      ? { ...e, type: e.type === "reg" ? "ic" : "reg", placement: null } : e));

  const toggleStatus = (id) =>
    setEvents(evs => evs.map(e => e.id === id
      ? { ...e, status: e.status === "played" ? "upcoming" : "played", placement: null } : e));

  const togglePlacement = (id, label) =>
    setEvents(evs => evs.map(e => e.id === id
      ? { ...e, placement: e.placement === label ? null : label } : e));

  const addEvent = () => {
    if (events.length >= 10) return;
    setEvents(evs => [...evs, { id: nextId++, type: "reg", status: "upcoming", placement: null }]);
  };

  const removeEvent = (id) => {
    if (events.length <= 1) return;
    setEvents(evs => evs.filter(e => e.id !== id));
  };

  const playedRegEvents   = React.useMemo(() => events.filter(e => e.status === "played"   && e.type === "reg"), [events]);
  const playedICEvents    = React.useMemo(() => events.filter(e => e.status === "played"   && e.type === "ic"),  [events]);
  const upcomingRegEvents = React.useMemo(() => events.filter(e => e.status === "upcoming" && e.type === "reg"), [events]);
  const upcomingICEvents  = React.useMemo(() => events.filter(e => e.status === "upcoming" && e.type === "ic"),  [events]);

  const nUpcomingReg = upcomingRegEvents.length;
  const nUpcomingIC  = upcomingICEvents.length;

  const allSelectedCPs = React.useMemo(() =>
    events.filter(e => e.placement).map(e => getCP(e.type, e.placement)).sort((a, b) => b - a),
    [events]
  );
  const top5Sum = allSelectedCPs.slice(0, TOP_N).reduce((a, b) => a + b, 0);
  const totalCP = top5Sum + CUPS;
  const allSelected = events.every(e => e.placement);
  const ti = allSelected ? getThresholdInfo(totalCP) : null;

  const playedRegData = React.useMemo(() =>
    playedRegEvents.filter(e => e.placement)
      .map(e => ({ label: e.placement, cp: getCP("reg", e.placement) }))
      .sort((a, b) => b.cp - a.cp),
    [playedRegEvents]
  );
  const playedICData = React.useMemo(() =>
    playedICEvents.filter(e => e.placement)
      .map(e => ({ label: e.placement, cp: getCP("ic", e.placement) }))
      .sort((a, b) => b.cp - a.cp),
    [playedICEvents]
  );

  // 0 = did not place / no points scored
  const allowedRegCPs = React.useMemo(() =>
    regCapCp !== null
      ? [0, ...REG_PLACEMENTS.filter(p => p.cp <= regCapCp).map(p => p.cp)]
      : [0, ...REG_PLACEMENTS.map(p => p.cp)],
    [regCapCp]
  );
  const allowedICCPs = React.useMemo(() =>
    icCapCp !== null
      ? [0, ...IC_PLACEMENTS.filter(p => p.cp <= icCapCp).map(p => p.cp)]
      : [0, ...IC_PLACEMENTS.map(p => p.cp)],
    [icCapCp]
  );

  const { combos, totalCount } = React.useMemo(() => {
    const pCPs = [
      ...playedRegData.map(p => p.cp),
      ...playedICData.map(p => p.cp),
    ];
    const regCombos = multisetCombos(allowedRegCPs, nUpcomingReg);
    const icCombos  = multisetCombos(allowedICCPs,  nUpcomingIC);

    const seen = new Set();
    const results = [];

    for (const regC of regCombos) {
      for (const icC of icCombos) {
        const allC = [...pCPs, ...regC, ...icC].sort((a, b) => b - a);
        // Deduplicate by full sorted CP signature (e.g. [reg=80,ic=0] same outcome as [reg=0,ic=80] when both are 80cp)
        const sig = allC.join(",");
        if (seen.has(sig)) continue;
        seen.add(sig);
        const mSum = allC.slice(0, TOP_N).reduce((a, b) => a + b, 0);
        const t = mSum + CUPS;
        if (t >= minTotal) results.push({ regC, icC, mSum, total: t });
      }
    }

    results.sort((a, b) => sortDir === "desc" ? b.total - a.total : a.total - b.total);
    return { combos: results.slice(0, MAX_DISPLAY), totalCount: results.length };
  }, [playedRegData, playedICData, nUpcomingReg, nUpcomingIC, allowedRegCPs, allowedICCPs, minTotal, sortDir]);

  const buildTableData = React.useCallback(() => {
    const headers = [
      ...playedRegData.map((_, i) => `Played Reg ${i + 1}`),
      ...playedICData.map((_, i)  => `Played IC ${i + 1}`),
      ...Array.from({ length: nUpcomingReg }, (_, i) => `Upcoming Reg ${i + 1}`),
      ...Array.from({ length: nUpcomingIC  }, (_, i) => `Upcoming IC ${i + 1}`),
      `Top-${TOP_N} Sum`, "Total CP",
    ];
    const rows = combos.map(row => [
      ...playedRegData.map(p => `${p.label}(${p.cp})`),
      ...playedICData.map(p  => `${p.label}(${p.cp})`),
      ...row.regC.map(cp => cp === 0 ? "—(0)" : `${cpToLabel("reg", cp)}(${cp})`),
      ...row.icC.map(cp  => cp === 0 ? "—(0)" : `${cpToLabel("ic",  cp)}(${cp})`),
      row.mSum, row.total,
    ]);
    return [headers, ...rows];
  }, [combos, playedRegData, playedICData, nUpcomingReg, nUpcomingIC]);

  const downloadCSV = React.useCallback(() => {
    const data = buildTableData();
    const csv = data.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = "cp-combinations.csv"; a.click();
    URL.revokeObjectURL(url);
  }, [buildTableData]);

  const copyToClipboard = React.useCallback(async () => {
    const data = buildTableData();
    const text = data.map(r => r.join("\t")).join("\n");
    try { await navigator.clipboard.writeText(text); setCopyStatus("✓ Copied"); }
    catch { setCopyStatus("Failed"); }
    setTimeout(() => setCopyStatus(""), 2200);
  }, [buildTableData]);

  const nUpcomingUnset = events.filter(e => e.status === "upcoming" && !e.placement).length;

  const selStyle = {
    background: T.selBg, border: `1px solid ${T.selBorder}`,
    borderRadius: 6, padding: "5px 9px", color: T.selColor, fontSize: 11, cursor: "pointer", outline: "none"
  };
  const th = { padding: "8px 12px", textAlign: "left", fontSize: 10, color: T.textMuted, fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.07em", whiteSpace: "nowrap" };
  const td = { padding: "6px 12px", verticalAlign: "middle" };

  return (
    <div style={{ minHeight: "100vh", background: T.pageBg, fontFamily: "'IBM Plex Sans', sans-serif", color: T.text, padding: "24px 18px", maxWidth: 1080, margin: "0 auto", transition: "background 0.2s, color 0.2s" }}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 18, gap: 12 }}>
        <div>
          <h1 style={{ margin: "0 0 4px", fontSize: 20, fontWeight: 600, color: T.text, letterSpacing: "-0.02em" }}>
            2026 Pokémon TCG CP Calculator
          </h1>
          <p style={{ margin: "0 0 4px", fontSize: 11, fontStyle: "italic", color: T.textMuted }}>
            {subtitle}
          </p>
          <p style={{ margin: 0, fontSize: 11, color: T.textMuted, lineHeight: 1.6 }}>
            Top {TOP_N} major finishes count · +{CUPS} CP for maxed Challenges/Cups ·{" "}
            <span style={{ color: "#6366f1" }}>Click type badge</span> to swap Regional ↔ IC ·{" "}
            <span style={{ color: "#22c55e" }}>Click status badge</span> to toggle Played ↔ Upcoming
          </p>
        </div>

        {/* Top-right controls */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, flexShrink: 0 }}>
          {/* Dark/light toggle */}
          <button onClick={() => setDark(d => !d)} title={dark ? "Switch to light mode" : "Switch to dark mode"}
            style={{
              background: dark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.07)",
              border: `1px solid ${dark ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.15)"}`,
              borderRadius: 7, padding: "5px 10px", cursor: "pointer",
              color: T.textSub, fontSize: 13, outline: "none", lineHeight: 1
            }}>
            {dark ? "☀️" : "🌙"}
          </button>

          {/* Info icon */}
          <div className="tooltip-wrap">
            <div style={{
              width: 24, height: 24, borderRadius: "50%",
              background: dark ? "rgba(255,255,255,0.07)" : "rgba(0,0,0,0.07)",
              border: `1px solid ${dark ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.15)"}`,
              display: "flex", alignItems: "center", justifyContent: "center",
              cursor: "default", color: T.textMuted, fontSize: 12, fontWeight: 600, userSelect: "none"
            }}>ℹ</div>
            <div className="tooltip-box">
              <strong style={{ color: dark ? "#e2e8f0" : "#0f172a", display: "block", marginBottom: 6 }}>How to use</strong>
              Add events using <em>+ Add Event Slot</em>. Toggle each event between <strong>Regional</strong> and <strong>IC</strong>, and between <strong>Played</strong> and <strong>Upcoming</strong>. For played events, click your finish to lock it in — these appear as fixed columns in the table below.<br /><br />
              The <strong>Remaining Combinations</strong> table enumerates every possible finish at your upcoming events and shows which combinations reach your Min CP threshold. A "—" means no points scored at that event. Use the exclusion dropdowns to hide unrealistic deep runs.
            </div>
          </div>
        </div>
      </div>

      {/* Event rows */}
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
        {events.map((ev, idx) => {
          const placements = getPlacements(ev.type);
          const isPlayed = ev.status === "played";
          return (
            <div key={ev.id} style={{
              background: T.cardBg,
              border: `1px solid ${isPlayed ? T.cardBorderPlayed : T.cardBorderUpcoming}`,
              borderRadius: 9, padding: "8px 13px", transition: "background 0.2s",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 7 }}>
                <span style={{ fontSize: 11, color: T.textDim, fontFamily: "'IBM Plex Mono', monospace", minWidth: 16 }}>{idx + 1}</span>

                <button onClick={() => toggleType(ev.id)} title="Swap Regional ↔ IC"
                  style={{
                    background: ev.type === "ic" ? "rgba(139,92,246,0.18)" : "rgba(59,130,246,0.12)",
                    border: `1px solid ${ev.type === "ic" ? "rgba(139,92,246,0.45)" : "rgba(59,130,246,0.35)"}`,
                    color: ev.type === "ic" ? "#c4b5fd" : "#93c5fd",
                    borderRadius: 5, padding: "2px 8px", fontSize: 10,
                    cursor: "pointer", fontWeight: 500, letterSpacing: "0.04em", outline: "none", transition: "all 0.14s"
                  }}>{ev.type === "ic" ? "⚡ IC" : "🏆 Regional"}</button>

                <button onClick={() => toggleStatus(ev.id)}
                  style={{
                    background: isPlayed ? "rgba(100,116,139,0.12)" : "rgba(34,197,94,0.1)",
                    border: `1px solid ${isPlayed ? "rgba(100,116,139,0.3)" : "rgba(34,197,94,0.3)"}`,
                    color: isPlayed ? "#64748b" : "#4ade80",
                    borderRadius: 5, padding: "2px 8px", fontSize: 10,
                    cursor: "pointer", fontWeight: 500, letterSpacing: "0.04em", outline: "none", transition: "all 0.14s"
                  }}>{isPlayed ? "Played" : "Upcoming"}</button>

                {events.length > 1 && (
                  <button onClick={() => removeEvent(ev.id)}
                    style={{ marginLeft: "auto", background: "none", border: "none", color: T.textDim, cursor: "pointer", fontSize: 14, padding: "0 2px", outline: "none" }}
                    title="Remove event">×</button>
                )}
              </div>

              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {placements.map(p => {
                  const active = ev.placement === p.label;
                  return (
                    <button key={p.label} onClick={() => togglePlacement(ev.id, p.label)}
                      style={{
                        background: active ? "rgba(99,102,241,0.22)" : T.btnInactiveBg,
                        border: `1px solid ${active ? "#6366f1" : T.btnInactiveBorder}`,
                        borderRadius: 6, padding: "3px 9px", cursor: "pointer",
                        color: active ? "#a5b4fc" : T.btnInactiveColor,
                        fontFamily: "'IBM Plex Mono', monospace", fontSize: 11,
                        transition: "all 0.11s",
                        display: "inline-flex", flexDirection: "column", alignItems: "center",
                        outline: "none",
                        boxShadow: active ? "0 0 0 2px rgba(99,102,241,0.18)" : "none"
                      }}>
                      <span style={{ fontWeight: active ? 600 : 400, lineHeight: 1.3 }}>{p.label}</span>
                      <span style={{ fontSize: 9, color: active ? "#818cf8" : T.cpLabelColor, lineHeight: 1.2 }}>{p.cp}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}

        {events.length < 10 && (
          <button onClick={addEvent}
            style={{
              background: T.addBtnBg, border: `1px dashed ${T.addBtnBorder}`,
              borderRadius: 9, padding: "7px", color: T.addBtnColor, cursor: "pointer",
              fontSize: 12, outline: "none", letterSpacing: "0.04em"
            }}>+ Add Event Slot</button>
        )}
      </div>

      {/* Result panel */}
      <div style={{
        background: ti ? ti.bg : T.resultPanelDefault,
        border: `1px solid ${ti ? ti.color + "40" : T.resultPanelBorder}`,
        borderRadius: 11, padding: "14px 18px", marginBottom: 20, transition: "all 0.3s"
      }}>
        {allSelected ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontSize: 10, color: T.textMuted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Total Championship Points</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontSize: 38, fontWeight: 600, fontFamily: "'IBM Plex Mono', monospace", color: ti?.color ?? T.text, letterSpacing: "-0.03em", lineHeight: 1 }}>
                  {totalCP}
                </span>
                <span style={{ fontSize: 11, color: T.subTotal }}>{top5Sum} majors + {CUPS} cups</span>
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
              {THRESHOLDS.map(t => {
                const tInfo = getThresholdInfo(t);
                const hit = totalCP >= t;
                return (
                  <div key={t} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, opacity: hit ? 1 : 0.3 }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: hit ? tInfo?.color : T.textDim }} />
                    <span style={{ color: hit ? tInfo?.color : T.textMuted, fontFamily: "'IBM Plex Mono', monospace" }}>
                      {t} {hit ? "✓" : `(need ${t - totalCP} more)`}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{ color: T.resultTextEmpty, fontSize: 12, textAlign: "center" }}>
            {events.filter(e => !e.placement).length} event{events.filter(e => !e.placement).length !== 1 ? "s" : ""} still need a placement selected
          </div>
        )}
      </div>

      {/* Table controls */}
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 8 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.text, marginBottom: 1 }}>Remaining Combinations</div>
          <div style={{ fontSize: 11, color: T.textMuted }}>
            {nUpcomingReg} upcoming reg · {nUpcomingIC} upcoming IC ·{" "}
            {totalCount > MAX_DISPLAY
              ? `showing top ${MAX_DISPLAY} of ${totalCount.toLocaleString()}`
              : `${totalCount} unique combination${totalCount !== 1 ? "s" : ""}`}
          </div>
          {nUpcomingUnset > 0 && (
            <div style={{ fontSize: 10, color: "#b45309", marginTop: 2 }}>
              ⚠ {nUpcomingUnset} upcoming event{nUpcomingUnset !== 1 ? "s" : ""} have no placement selected above — those slots are still enumerated in the table
            </div>
          )}
        </div>

        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          <div>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Excl. Reg better than</div>
            <select value={regCapCp ?? ""} onChange={e => setRegCapCp(e.target.value === "" ? null : Number(e.target.value))} style={selStyle}>
              <option value="">None</option>
              {REG_PLACEMENTS.slice(0, -1).map(p => (<option key={p.label} value={p.cp}>{p.label} ({p.cp} CP)</option>))}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Excl. IC better than</div>
            <select value={icCapCp ?? ""} onChange={e => setIcCapCp(e.target.value === "" ? null : Number(e.target.value))} style={selStyle}>
              <option value="">None</option>
              {IC_PLACEMENTS.slice(0, -1).map(p => (<option key={p.label} value={p.cp}>{p.label} ({p.cp} CP)</option>))}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Min CP</div>
            <select value={minTotal} onChange={e => setMinTotal(Number(e.target.value))} style={selStyle}>
              {[580,600,620,640,660,680,700,720,740,760,780,800].map(v => <option key={v} value={v}>{v}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Sort</div>
            <select value={sortDir} onChange={e => setSortDir(e.target.value)} style={selStyle}>
              <option value="desc">High → Low</option>
              <option value="asc">Low → High</option>
            </select>
          </div>
          <div>
            <div style={{ fontSize: 10, color: T.textMuted, marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Export</div>
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={copyToClipboard} style={{
                background: copyStatus ? "rgba(34,197,94,0.14)" : (dark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)"),
                border: `1px solid ${copyStatus ? "rgba(34,197,94,0.35)" : T.cardBorder}`,
                borderRadius: 6, padding: "5px 10px", cursor: "pointer",
                color: copyStatus ? "#4ade80" : T.textSub, fontSize: 11, outline: "none",
                transition: "all 0.18s", minWidth: 72, textAlign: "center"
              }}>{copyStatus || "📋 Copy"}</button>
              <button onClick={downloadCSV} style={{
                background: dark ? "rgba(255,255,255,0.05)" : "rgba(0,0,0,0.05)",
                border: `1px solid ${T.cardBorder}`,
                borderRadius: 6, padding: "5px 10px", cursor: "pointer",
                color: T.textSub, fontSize: 11, outline: "none"
              }}>⬇ CSV</button>
            </div>
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 12, marginBottom: 8, flexWrap: "wrap", alignItems: "center" }}>
        {[{ color: "#4ade80", label: "760+" },{ color: "#86efac", label: "740+" },{ color: "#facc15", label: "720+" },{ color: "#fbbf24", label: "700+" },{ color: "#fb923c", label: "680+" }].map(({ color, label }) => (
          <div key={label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: color }} />
            <span style={{ color: T.textMuted }}>{label}</span>
          </div>
        ))}
        <div style={{ width: 1, height: 12, background: T.divider }} />
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: dark ? "rgba(148,163,184,0.1)" : "rgba(0,0,0,0.08)", border: `1px solid ${dark ? "rgba(148,163,184,0.22)" : "rgba(0,0,0,0.15)"}` }} />
          <span style={{ color: T.textMuted }}>Played (fixed)</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: "rgba(99,102,241,0.18)", border: "1px solid rgba(99,102,241,0.4)" }} />
          <span style={{ color: T.textMuted }}>Upcoming Reg</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: "rgba(139,92,246,0.18)", border: "1px solid rgba(139,92,246,0.4)" }} />
          <span style={{ color: T.textMuted }}>Upcoming IC</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: T.addBtnBg, border: `1px solid ${T.addBtnBorder}` }} />
          <span style={{ color: T.textMuted }}>— (0 points scored)</span>
        </div>
      </div>

      {/* Table */}
      <div style={{ overflowX: "auto", borderRadius: 10, border: `1px solid ${T.cardBorder}` }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: T.tableHead, borderBottom: `1px solid ${T.tableHeadBorder}` }}>
              {playedRegData.map((_, i) => (
                <th key={`prh${i}`} style={{ ...th, color: T.textMuted, background: T.tableDark }}>Played Reg {i + 1}</th>
              ))}
              {playedICData.map((_, i) => (
                <th key={`pich${i}`} style={{ ...th, color: T.textMuted, background: T.tableDark, borderRight: i === playedICData.length - 1 ? `2px solid ${T.tableDivider}` : undefined }}>Played IC {i + 1}</th>
              ))}
              {playedRegData.length > 0 && playedICData.length === 0 && nUpcomingReg + nUpcomingIC > 0 && (
                <th style={{ ...th, padding: 0, width: 0, borderRight: `2px solid ${T.tableDivider}` }} />
              )}
              {Array.from({ length: nUpcomingReg }, (_, i) => (
                <th key={`urh${i}`} style={{ ...th, color: "#93c5fd" }}>Upcoming Reg {i + 1}</th>
              ))}
              {Array.from({ length: nUpcomingIC }, (_, i) => (
                <th key={`uich${i}`} style={{ ...th, color: "#c4b5fd" }}>Upcoming IC {i + 1}</th>
              ))}
              <th style={th}>Top-{TOP_N} Sum</th>
              <th style={th}>Total CP</th>
            </tr>
          </thead>
          <tbody>
            {combos.map((row, i) => {
              const rowTI = getThresholdInfo(row.total);
              return (
                <tr key={i} style={{ borderBottom: `1px solid ${T.tableRowBorder}`, background: rowTI ? rowTI.bg : "transparent" }}>
                  {playedRegData.map((p, j) => (
                    <td key={`pr${j}`} style={{ ...td, background: T.tableDark }}>
                      <Chip label={p.label} cp={p.cp} variant="played-reg" dark={dark} />
                    </td>
                  ))}
                  {playedICData.map((p, j) => (
                    <td key={`pic${j}`} style={{ ...td, background: T.tableDark, borderRight: j === playedICData.length - 1 ? `2px solid ${T.tableDivider}` : undefined }}>
                      <Chip label={p.label} cp={p.cp} variant="played-ic" dark={dark} />
                    </td>
                  ))}
                  {playedRegData.length > 0 && playedICData.length === 0 && nUpcomingReg + nUpcomingIC > 0 && (
                    <td style={{ padding: 0, width: 0, borderRight: `2px solid ${T.tableDivider}` }} />
                  )}
                  {row.regC.map((cp, j) => (
                    <td key={`ur${j}`} style={td}>
                      <Chip label={cpToLabel("reg", cp)} cp={cp} variant="upcoming-reg" dark={dark} />
                    </td>
                  ))}
                  {row.icC.map((cp, j) => (
                    <td key={`uic${j}`} style={td}>
                      <Chip label={cpToLabel("ic", cp)} cp={cp} variant="upcoming-ic" dark={dark} />
                    </td>
                  ))}
                  <td style={{ ...td, fontFamily: "'IBM Plex Mono', monospace", color: T.top5SumColor, fontSize: 11, fontWeight: 500 }}>{row.mSum}</td>
                  <td style={td}>
                    <span style={{
                      fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 13,
                      color: rowTI ? rowTI.color : T.textMuted,
                      background: rowTI ? `${rowTI.color}14` : (dark ? "rgba(255,255,255,0.03)" : "rgba(0,0,0,0.04)"),
                      border: `1px solid ${rowTI ? rowTI.color + "28" : T.cardBorder}`,
                      borderRadius: 5, padding: "2px 9px"
                    }}>{row.total}</span>
                  </td>
                </tr>
              );
            })}
            {combos.length === 0 && (
              <tr>
                <td colSpan={playedRegData.length + playedICData.length + nUpcomingReg + nUpcomingIC + 2}
                  style={{ padding: 28, textAlign: "center", color: T.noDataColor }}>
                  No combinations meet the current filters.
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {totalCount > MAX_DISPLAY && (
        <div style={{ marginTop: 8, fontSize: 11, color: T.textMuted, textAlign: "center" }}>
          Showing top {MAX_DISPLAY} of {totalCount.toLocaleString()} — raise Min CP or add exclusions to narrow results
        </div>
      )}
    </div>
  );
}

function Chip({ label, cp, variant, dark }) {
  if (cp === 0) {
    return (
      <span style={{
        display: "inline-flex", alignItems: "center",
        background: dark ? "rgba(255,255,255,0.02)" : "rgba(0,0,0,0.04)",
        border: `1px solid ${dark ? "rgba(255,255,255,0.06)" : "rgba(0,0,0,0.08)"}`,
        borderRadius: 5, padding: "2px 9px",
        fontFamily: "'IBM Plex Mono', monospace",
        color: dark ? "#2d3748" : "#94a3b8", whiteSpace: "nowrap", fontSize: 11, fontStyle: "italic"
      }}>—</span>
    );
  }
  const styles = {
    "played-reg":   { bg: dark ? "rgba(148,163,184,0.08)" : "rgba(0,0,0,0.06)", border: dark ? "rgba(148,163,184,0.2)" : "rgba(0,0,0,0.12)", color: dark ? "#475569" : "#64748b", cpColor: "#60a5fa" },
    "played-ic":    { bg: dark ? "rgba(148,163,184,0.08)" : "rgba(0,0,0,0.06)", border: dark ? "rgba(148,163,184,0.2)" : "rgba(0,0,0,0.12)", color: dark ? "#475569" : "#64748b", cpColor: "#60a5fa" },
    "upcoming-reg": { bg: "rgba(99,102,241,0.12)",  border: "rgba(99,102,241,0.3)",  color: "#a5b4fc", cpColor: "#818cf8" },
    "upcoming-ic":  { bg: "rgba(139,92,246,0.12)",  border: "rgba(139,92,246,0.3)",  color: "#c4b5fd", cpColor: "#a78bfa" },
  };
  const s = styles[variant] || styles["upcoming-reg"];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 3,
      background: s.bg, border: `1px solid ${s.border}`,
      borderRadius: 5, padding: "2px 7px",
      fontFamily: "'IBM Plex Mono', monospace",
      color: s.color, whiteSpace: "nowrap", fontSize: 11
    }}>
      {label} <span style={{ color: s.cpColor, fontSize: 9, fontWeight: 600 }}>({cp})</span>
    </span>
  );
}

  </script>
  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
