<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pokemon CP Calculator</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { margin:0; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

const REG_PLACEMENTS = [
  { label: "2nd",   cp: 325 },
  { label: "T4",    cp: 300 },
  { label: "T8",    cp: 280 },
  { label: "T16",   cp: 200 },
  { label: "T32",   cp: 160 },
  { label: "T64",   cp: 120 },
  { label: "T128",  cp: 80  },
  { label: "T256",  cp: 60  },
  { label: "T512",  cp: 40  },
  { label: "T1024", cp: 20  },
];

const IC_PLACEMENTS = [
  { label: "T8",    cp: 380 },
  { label: "T16",   cp: 300 },
  { label: "T32",   cp: 240 },
  { label: "T64",   cp: 180 },
  { label: "T128",  cp: 140 },
  { label: "T256",  cp: 100 },
  { label: "T512",  cp: 80  },
  { label: "T1024", cp: 40  },
];

const CUPS = 260;
const TOP_N = 5;
const THRESHOLDS = [760, 740, 720, 700, 680];
const MAX_DISPLAY = 800;

function getThresholdInfo(total) {
  if (total >= 760) return { color: "#4ade80", bg: "rgba(74,222,128,0.08)" };
  if (total >= 740) return { color: "#86efac", bg: "rgba(134,239,172,0.07)" };
  if (total >= 720) return { color: "#facc15", bg: "rgba(250,204,21,0.08)" };
  if (total >= 700) return { color: "#fbbf24", bg: "rgba(251,191,36,0.07)" };
  if (total >= 680) return { color: "#fb923c", bg: "rgba(251,146,60,0.07)" };
  return null;
}

// Returns all ordered (with repetition, sorted desc) k-tuples from vals array
function multisetCombos(vals, k) {
  if (k === 0) return [[]];
  const res = [];
  function gen(start, cur) {
    if (cur.length === k) { res.push([...cur]); return; }
    for (let i = start; i < vals.length; i++) {
      cur.push(vals[i]); gen(i, cur); cur.pop();
    }
  }
  gen(0, []);
  return res;
}

const getPlacements = (type) => type === "ic" ? IC_PLACEMENTS : REG_PLACEMENTS;
const getCP = (type, label) => getPlacements(type).find(p => p.label === label)?.cp ?? 0;
const cpToLabel = (type, cp) => getPlacements(type).find(p => p.cp === cp)?.label ?? "?";

let nextId = 5;
const DEFAULT_EVENTS = [
  { id: 0, type: "reg", status: "played",   placement: "T64"  },
  { id: 1, type: "reg", status: "played",   placement: "T256" },
  { id: 2, type: "reg", status: "upcoming", placement: null   },
  { id: 3, type: "reg", status: "upcoming", placement: null   },
  { id: 4, type: "ic",  status: "upcoming", placement: null   },
];

function App() {
  const [events, setEvents] = React.useState(DEFAULT_EVENTS);
  const [minTotal, setMinTotal] = React.useState(700);
  const [sortDir, setSortDir] = React.useState("desc");
  const [regCapCp, setRegCapCp] = React.useState(null);
  const [icCapCp, setIcCapCp] = React.useState(null);
  const [copyStatus, setCopyStatus] = React.useState("");

  const toggleType = (id) =>
    setEvents(evs => evs.map(e => e.id === id
      ? { ...e, type: e.type === "reg" ? "ic" : "reg", placement: null }
      : e));

  const toggleStatus = (id) =>
    setEvents(evs => evs.map(e => e.id === id
      ? { ...e, status: e.status === "played" ? "upcoming" : "played", placement: null }
      : e));

  const togglePlacement = (id, label) =>
    setEvents(evs => evs.map(e => e.id === id
      ? { ...e, placement: e.placement === label ? null : label }
      : e));

  const addEvent = () => {
    if (events.length >= 10) return;
    setEvents(evs => [...evs, { id: nextId++, type: "reg", status: "upcoming", placement: null }]);
  };

  const removeEvent = (id) => {
    if (events.length <= 1) return;
    setEvents(evs => evs.filter(e => e.id !== id));
  };

  // Split events by status+type
  const playedRegEvents  = React.useMemo(() => events.filter(e => e.status === "played"   && e.type === "reg"), [events]);
  const playedICEvents   = React.useMemo(() => events.filter(e => e.status === "played"   && e.type === "ic"),  [events]);
  const upcomingRegEvents = React.useMemo(() => events.filter(e => e.status === "upcoming" && e.type === "reg"), [events]);
  const upcomingICEvents  = React.useMemo(() => events.filter(e => e.status === "upcoming" && e.type === "ic"),  [events]);

  const nUpcomingReg = upcomingRegEvents.length;
  const nUpcomingIC  = upcomingICEvents.length;

  // Personal calculator
  const allSelectedCPs = React.useMemo(() =>
    events.filter(e => e.placement).map(e => getCP(e.type, e.placement)).sort((a, b) => b - a),
    [events]
  );
  const top5Sum = allSelectedCPs.slice(0, TOP_N).reduce((a, b) => a + b, 0);
  const totalCP = top5Sum + CUPS;
  const allSelected = events.every(e => e.placement);
  const ti = allSelected ? getThresholdInfo(totalCP) : null;

  // Played CPs (fixed in every combo row)
  const playedRegData = React.useMemo(() =>
    playedRegEvents.filter(e => e.placement)
      .map(e => ({ label: e.placement, cp: getCP("reg", e.placement) }))
      .sort((a, b) => b.cp - a.cp),
    [playedRegEvents]
  );
  const playedICData = React.useMemo(() =>
    playedICEvents.filter(e => e.placement)
      .map(e => ({ label: e.placement, cp: getCP("ic", e.placement) }))
      .sort((a, b) => b.cp - a.cp),
    [playedICEvents]
  );

  // Allowed CPs after exclusion caps
  const allowedRegCPs = React.useMemo(() =>
    regCapCp !== null
      ? REG_PLACEMENTS.filter(p => p.cp <= regCapCp).map(p => p.cp)
      : REG_PLACEMENTS.map(p => p.cp),
    [regCapCp]
  );
  const allowedICCPs = React.useMemo(() =>
    icCapCp !== null
      ? IC_PLACEMENTS.filter(p => p.cp <= icCapCp).map(p => p.cp)
      : IC_PLACEMENTS.map(p => p.cp),
    [icCapCp]
  );

  // Build combinations — strictly nUpcomingReg regional slots + nUpcomingIC IC slots
  const { combos, totalCount } = React.useMemo(() => {
    const pCPs = [
      ...playedRegData.map(p => p.cp),
      ...playedICData.map(p => p.cp),
    ];

    const regCombos = multisetCombos(allowedRegCPs, nUpcomingReg); // sorted desc inside
    const icCombos  = multisetCombos(allowedICCPs,  nUpcomingIC);

    const results = [];
    for (const regC of regCombos) {
      for (const icC of icCombos) {
        const allC = [...pCPs, ...regC, ...icC].sort((a, b) => b - a);
        const mSum = allC.slice(0, TOP_N).reduce((a, b) => a + b, 0);
        const t = mSum + CUPS;
        if (t >= minTotal) results.push({ regC, icC, mSum, total: t });
      }
    }

    results.sort((a, b) => sortDir === "desc" ? b.total - a.total : a.total - b.total);
    return { combos: results.slice(0, MAX_DISPLAY), totalCount: results.length };
  }, [playedRegData, playedICData, nUpcomingReg, nUpcomingIC, allowedRegCPs, allowedICCPs, minTotal, sortDir]);

  // Export
  const buildTableData = React.useCallback(() => {
    const headers = [
      ...playedRegData.map((_, i) => `Played Reg ${i + 1}`),
      ...playedICData.map((_, i)  => `Played IC ${i + 1}`),
      ...Array.from({ length: nUpcomingReg }, (_, i) => `Upcoming Reg ${i + 1}`),
      ...Array.from({ length: nUpcomingIC  }, (_, i) => `Upcoming IC ${i + 1}`),
      `Top-${TOP_N} Sum`, "Total CP",
    ];
    const rows = combos.map(row => [
      ...playedRegData.map(p => `${p.label}(${p.cp})`),
      ...playedICData.map(p  => `${p.label}(${p.cp})`),
      ...row.regC.map(cp => `${cpToLabel("reg", cp)}(${cp})`),
      ...row.icC.map(cp  => `${cpToLabel("ic",  cp)}(${cp})`),
      row.mSum, row.total,
    ]);
    return [headers, ...rows];
  }, [combos, playedRegData, playedICData, nUpcomingReg, nUpcomingIC]);

  const downloadCSV = React.useCallback(() => {
    const data = buildTableData();
    const csv = data.map(r => r.map(v => `"${v}"`).join(",")).join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "cp-combinations.csv"; a.click();
    URL.revokeObjectURL(url);
  }, [buildTableData]);

  const copyToClipboard = React.useCallback(async () => {
    const data = buildTableData();
    const text = data.map(r => r.join("\t")).join("\n");
    try {
      await navigator.clipboard.writeText(text);
      setCopyStatus("✓ Copied");
    } catch { setCopyStatus("Failed"); }
    setTimeout(() => setCopyStatus(""), 2200);
  }, [buildTableData]);

  const nUpcomingUnset = events.filter(e => e.status === "upcoming" && !e.placement).length;

  return (
    <div style={{ minHeight: "100vh", background: "#080c18", fontFamily: "'IBM Plex Sans', sans-serif", color: "#e2e8f0", padding: "24px 18px", maxWidth: 1080, margin: "0 auto" }}>
      <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

      {/* Header */}
      <div style={{ marginBottom: 18 }}>
        <h1 style={{ margin: "0 0 3px", fontSize: 20, fontWeight: 600, color: "#f1f5f9", letterSpacing: "-0.02em" }}>
          2026 Pokémon TCG CP Calculator
        </h1>
        <p style={{ margin: 0, fontSize: 11, color: "#475569", lineHeight: 1.6 }}>
          Top {TOP_N} major finishes count · +{CUPS} CP for maxed Challenges/Cups ·{" "}
          <span style={{ color: "#6366f1" }}>Click type badge</span> to swap Regional ↔ IC ·{" "}
          <span style={{ color: "#22c55e" }}>Click status badge</span> to toggle Played ↔ Upcoming
        </p>
      </div>

      {/* Event rows */}
      <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 16 }}>
        {events.map((ev, idx) => {
          const placements = getPlacements(ev.type);
          const isPlayed = ev.status === "played";
          return (
            <div key={ev.id} style={{
              background: "rgba(255,255,255,0.025)",
              border: `1px solid ${isPlayed ? "rgba(255,255,255,0.055)" : "rgba(255,255,255,0.09)"}`,
              borderRadius: 9, padding: "8px 13px",
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 7 }}>
                <span style={{ fontSize: 11, color: "#2d3748", fontFamily: "'IBM Plex Mono', monospace", minWidth: 16 }}>{idx + 1}</span>

                <button onClick={() => toggleType(ev.id)}
                  title="Swap Regional ↔ IC"
                  style={{
                    background: ev.type === "ic" ? "rgba(139,92,246,0.18)" : "rgba(59,130,246,0.12)",
                    border: `1px solid ${ev.type === "ic" ? "rgba(139,92,246,0.45)" : "rgba(59,130,246,0.35)"}`,
                    color: ev.type === "ic" ? "#c4b5fd" : "#93c5fd",
                    borderRadius: 5, padding: "2px 8px", fontSize: 10,
                    cursor: "pointer", fontWeight: 500, letterSpacing: "0.04em", outline: "none",
                    transition: "all 0.14s"
                  }}>
                  {ev.type === "ic" ? "⚡ IC" : "🏆 Regional"}
                </button>

                <button onClick={() => toggleStatus(ev.id)}
                  style={{
                    background: isPlayed ? "rgba(100,116,139,0.12)" : "rgba(34,197,94,0.1)",
                    border: `1px solid ${isPlayed ? "rgba(100,116,139,0.3)" : "rgba(34,197,94,0.3)"}`,
                    color: isPlayed ? "#64748b" : "#4ade80",
                    borderRadius: 5, padding: "2px 8px", fontSize: 10,
                    cursor: "pointer", fontWeight: 500, letterSpacing: "0.04em", outline: "none",
                    transition: "all 0.14s"
                  }}>
                  {isPlayed ? "Played" : "Upcoming"}
                </button>

                {events.length > 1 && (
                  <button onClick={() => removeEvent(ev.id)}
                    style={{ marginLeft: "auto", background: "none", border: "none", color: "#2d3748", cursor: "pointer", fontSize: 14, padding: "0 2px", outline: "none" }}
                    title="Remove event">×</button>
                )}
              </div>

              <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                {placements.map(p => {
                  const active = ev.placement === p.label;
                  return (
                    <button key={p.label} onClick={() => togglePlacement(ev.id, p.label)}
                      style={{
                        background: active ? "rgba(99,102,241,0.22)" : "rgba(255,255,255,0.03)",
                        border: `1px solid ${active ? "#6366f1" : "rgba(255,255,255,0.08)"}`,
                        borderRadius: 6, padding: "3px 9px", cursor: "pointer",
                        color: active ? "#a5b4fc" : "#4a5568",
                        fontFamily: "'IBM Plex Mono', monospace", fontSize: 11,
                        transition: "all 0.11s",
                        display: "inline-flex", flexDirection: "column", alignItems: "center",
                        outline: "none",
                        boxShadow: active ? "0 0 0 2px rgba(99,102,241,0.18)" : "none"
                      }}>
                      <span style={{ fontWeight: active ? 600 : 400, lineHeight: 1.3 }}>{p.label}</span>
                      <span style={{ fontSize: 9, color: active ? "#818cf8" : "#2d3748", lineHeight: 1.2 }}>{p.cp}</span>
                    </button>
                  );
                })}
              </div>
            </div>
          );
        })}

        {events.length < 10 && (
          <button onClick={addEvent}
            style={{
              background: "rgba(255,255,255,0.015)", border: "1px dashed rgba(255,255,255,0.08)",
              borderRadius: 9, padding: "7px", color: "#2d3748", cursor: "pointer",
              fontSize: 12, outline: "none", letterSpacing: "0.04em"
            }}>+ Add Event Slot</button>
        )}
      </div>

      {/* Result panel */}
      <div style={{
        background: ti ? ti.bg : "rgba(255,255,255,0.02)",
        border: `1px solid ${ti ? ti.color + "40" : "rgba(255,255,255,0.07)"}`,
        borderRadius: 11, padding: "14px 18px", marginBottom: 20, transition: "all 0.3s"
      }}>
        {allSelected ? (
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
            <div>
              <div style={{ fontSize: 10, color: "#64748b", textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: 4 }}>Total Championship Points</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
                <span style={{ fontSize: 38, fontWeight: 600, fontFamily: "'IBM Plex Mono', monospace", color: ti?.color ?? "#e2e8f0", letterSpacing: "-0.03em", lineHeight: 1 }}>
                  {totalCP}
                </span>
                <span style={{ fontSize: 11, color: "#64748b" }}>{top5Sum} majors + {CUPS} cups</span>
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
              {THRESHOLDS.map(t => {
                const tInfo = getThresholdInfo(t);
                const hit = totalCP >= t;
                return (
                  <div key={t} style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 11, opacity: hit ? 1 : 0.3 }}>
                    <div style={{ width: 6, height: 6, borderRadius: "50%", background: hit ? tInfo?.color : "#1e293b" }} />
                    <span style={{ color: hit ? tInfo?.color : "#475569", fontFamily: "'IBM Plex Mono', monospace" }}>
                      {t} {hit ? "✓" : `(need ${t - totalCP} more)`}
                    </span>
                  </div>
                );
              })}
            </div>
          </div>
        ) : (
          <div style={{ color: "#334155", fontSize: 12, textAlign: "center" }}>
            {events.filter(e => !e.placement).length} event{events.filter(e => !e.placement).length !== 1 ? "s" : ""} still need a placement selected
          </div>
        )}
      </div>

      {/* Table header / controls */}
      <div style={{ display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 10, marginBottom: 8 }}>
        <div>
          <div style={{ fontSize: 13, fontWeight: 600, color: "#cbd5e1", marginBottom: 1 }}>Remaining Combinations</div>
          <div style={{ fontSize: 11, color: "#475569" }}>
            {nUpcomingReg} upcoming reg · {nUpcomingIC} upcoming IC ·{" "}
            {totalCount > MAX_DISPLAY
              ? `showing top ${MAX_DISPLAY} of ${totalCount.toLocaleString()}`
              : `${totalCount} unique combination${totalCount !== 1 ? "s" : ""}`}
          </div>
          {nUpcomingUnset > 0 && (
            <div style={{ fontSize: 10, color: "#b45309", marginTop: 2 }}>
              ⚠ {nUpcomingUnset} upcoming event{nUpcomingUnset !== 1 ? "s" : ""} have no placement selected above — those slots are still enumerated in the table
            </div>
          )}
        </div>

        <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "flex-end" }}>
          {/* Exclusion: Regional */}
          <div>
            <div style={{ fontSize: 10, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Excl. Reg better than</div>
            <select
              value={regCapCp ?? ""}
              onChange={e => setRegCapCp(e.target.value === "" ? null : Number(e.target.value))}
              style={selStyle}>
              <option value="">None</option>
              {REG_PLACEMENTS.slice(0, -1).map(p => (
                <option key={p.label} value={p.cp}>{p.label} ({p.cp} CP)</option>
              ))}
            </select>
          </div>

          {/* Exclusion: IC */}
          <div>
            <div style={{ fontSize: 10, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Excl. IC better than</div>
            <select
              value={icCapCp ?? ""}
              onChange={e => setIcCapCp(e.target.value === "" ? null : Number(e.target.value))}
              style={selStyle}>
              <option value="">None</option>
              {IC_PLACEMENTS.slice(0, -1).map(p => (
                <option key={p.label} value={p.cp}>{p.label} ({p.cp} CP)</option>
              ))}
            </select>
          </div>

          <div>
            <div style={{ fontSize: 10, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Min CP</div>
            <select value={minTotal} onChange={e => setMinTotal(Number(e.target.value))} style={selStyle}>
              {[580,600,620,640,660,680,700,720,740,760,780,800].map(v => <option key={v} value={v}>{v}</option>)}
            </select>
          </div>

          <div>
            <div style={{ fontSize: 10, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Sort</div>
            <select value={sortDir} onChange={e => setSortDir(e.target.value)} style={selStyle}>
              <option value="desc">High → Low</option>
              <option value="asc">Low → High</option>
            </select>
          </div>

          {/* Export */}
          <div>
            <div style={{ fontSize: 10, color: "#475569", marginBottom: 3, textTransform: "uppercase", letterSpacing: "0.06em" }}>Export</div>
            <div style={{ display: "flex", gap: 4 }}>
              <button onClick={copyToClipboard} style={{
                background: copyStatus ? "rgba(34,197,94,0.14)" : "rgba(255,255,255,0.05)",
                border: `1px solid ${copyStatus ? "rgba(34,197,94,0.35)" : "rgba(255,255,255,0.1)"}`,
                borderRadius: 6, padding: "5px 10px", cursor: "pointer",
                color: copyStatus ? "#4ade80" : "#94a3b8", fontSize: 11, outline: "none",
                transition: "all 0.18s", minWidth: 72, textAlign: "center"
              }}>
                {copyStatus || "📋 Copy"}
              </button>
              <button onClick={downloadCSV} style={{
                background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)",
                borderRadius: 6, padding: "5px 10px", cursor: "pointer",
                color: "#94a3b8", fontSize: 11, outline: "none"
              }}>⬇ CSV</button>
            </div>
          </div>
        </div>
      </div>

      {/* Legend */}
      <div style={{ display: "flex", gap: 12, marginBottom: 8, flexWrap: "wrap", alignItems: "center" }}>
        {[
          { color: "#4ade80", label: "760+" }, { color: "#86efac", label: "740+" },
          { color: "#facc15", label: "720+" }, { color: "#fbbf24", label: "700+" },
          { color: "#fb923c", label: "680+" },
        ].map(({ color, label }) => (
          <div key={label} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: 2, background: color }} />
            <span style={{ color: "#64748b" }}>{label}</span>
          </div>
        ))}
        <div style={{ width: 1, height: 12, background: "rgba(255,255,255,0.07)" }} />
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: "rgba(148,163,184,0.1)", border: "1px solid rgba(148,163,184,0.22)" }} />
          <span style={{ color: "#64748b" }}>Played (fixed)</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: "rgba(99,102,241,0.18)", border: "1px solid rgba(99,102,241,0.4)" }} />
          <span style={{ color: "#64748b" }}>Upcoming Reg</span>
        </div>
        <div style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 10 }}>
          <div style={{ width: 8, height: 8, borderRadius: 2, background: "rgba(139,92,246,0.18)", border: "1px solid rgba(139,92,246,0.4)" }} />
          <span style={{ color: "#64748b" }}>Upcoming IC</span>
        </div>
      </div>

      {/* Table */}
      <div style={{ overflowX: "auto", borderRadius: 10, border: "1px solid rgba(255,255,255,0.07)" }}>
        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
          <thead>
            <tr style={{ background: "rgba(255,255,255,0.035)", borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
              {playedRegData.map((_, i) => (
                <th key={`prh${i}`} style={{ ...th, color: "#475569", background: "rgba(0,0,0,0.12)" }}>
                  Played Reg {i + 1}
                </th>
              ))}
              {playedICData.map((_, i) => (
                <th key={`pich${i}`} style={{
                  ...th, color: "#475569", background: "rgba(0,0,0,0.12)",
                  borderRight: i === playedICData.length - 1 ? "2px solid rgba(255,255,255,0.1)" : undefined
                }}>
                  Played IC {i + 1}
                </th>
              ))}
              {playedRegData.length > 0 && playedICData.length === 0 && nUpcomingReg + nUpcomingIC > 0 && (
                // phantom th to carry divider when no played ICs
                <th style={{ ...th, padding: 0, width: 0, borderRight: "2px solid rgba(255,255,255,0.1)" }} />
              )}
              {Array.from({ length: nUpcomingReg }, (_, i) => (
                <th key={`urh${i}`} style={{ ...th, color: "#93c5fd" }}>
                  Upcoming Reg {i + 1}
                </th>
              ))}
              {Array.from({ length: nUpcomingIC }, (_, i) => (
                <th key={`uich${i}`} style={{ ...th, color: "#c4b5fd" }}>
                  Upcoming IC {i + 1}
                </th>
              ))}
              <th style={th}>Top-{TOP_N} Sum</th>
              <th style={th}>Total CP</th>
            </tr>
          </thead>
          <tbody>
            {combos.map((row, i) => {
              const rowTI = getThresholdInfo(row.total);
              return (
                <tr key={i} style={{ borderBottom: "1px solid rgba(255,255,255,0.03)", background: rowTI ? rowTI.bg : "transparent" }}>
                  {playedRegData.map((p, j) => (
                    <td key={`pr${j}`} style={{ ...td, background: "rgba(0,0,0,0.12)" }}>
                      <Chip label={p.label} cp={p.cp} variant="played-reg" />
                    </td>
                  ))}
                  {playedICData.map((p, j) => (
                    <td key={`pic${j}`} style={{
                      ...td, background: "rgba(0,0,0,0.12)",
                      borderRight: j === playedICData.length - 1 ? "2px solid rgba(255,255,255,0.1)" : undefined
                    }}>
                      <Chip label={p.label} cp={p.cp} variant="played-ic" />
                    </td>
                  ))}
                  {playedRegData.length > 0 && playedICData.length === 0 && nUpcomingReg + nUpcomingIC > 0 && (
                    <td style={{ padding: 0, width: 0, borderRight: "2px solid rgba(255,255,255,0.1)" }} />
                  )}
                  {row.regC.map((cp, j) => (
                    <td key={`ur${j}`} style={td}>
                      <Chip label={cpToLabel("reg", cp)} cp={cp} variant="upcoming-reg" />
                    </td>
                  ))}
                  {row.icC.map((cp, j) => (
                    <td key={`uic${j}`} style={td}>
                      <Chip label={cpToLabel("ic", cp)} cp={cp} variant="upcoming-ic" />
                    </td>
                  ))}
                  <td style={{ ...td, fontFamily: "'IBM Plex Mono', monospace", color: "#4a5568", fontSize: 11 }}>{row.mSum}</td>
                  <td style={td}>
                    <span style={{
                      fontFamily: "'IBM Plex Mono', monospace", fontWeight: 600, fontSize: 13,
                      color: rowTI ? rowTI.color : "#4a5568",
                      background: rowTI ? `${rowTI.color}14` : "rgba(255,255,255,0.03)",
                      border: `1px solid ${rowTI ? rowTI.color + "28" : "rgba(255,255,255,0.06)"}`,
                      borderRadius: 5, padding: "2px 9px"
                    }}>{row.total}</span>
                  </td>
                </tr>
              );
            })}
            {combos.length === 0 && (
              <tr>
                <td colSpan={playedRegData.length + playedICData.length + nUpcomingReg + nUpcomingIC + 2}
                  style={{ padding: 28, textAlign: "center", color: "#2d3748" }}>
                  No combinations meet the current filters.
                </td>
              </tr>
            )}
          </tbody>
        </table>
      </div>

      {totalCount > MAX_DISPLAY && (
        <div style={{ marginTop: 8, fontSize: 11, color: "#475569", textAlign: "center" }}>
          Showing top {MAX_DISPLAY} of {totalCount.toLocaleString()} — raise Min CP or add exclusions to narrow results
        </div>
      )}
    </div>
  );
}

function Chip({ label, cp, variant }) {
  const styles = {
    "played-reg":   { bg: "rgba(148,163,184,0.08)", border: "rgba(148,163,184,0.2)", color: "#475569", cpColor: "#2d3748" },
    "played-ic":    { bg: "rgba(148,163,184,0.08)", border: "rgba(148,163,184,0.2)", color: "#475569", cpColor: "#2d3748" },
    "upcoming-reg": { bg: "rgba(99,102,241,0.12)",  border: "rgba(99,102,241,0.3)",  color: "#a5b4fc", cpColor: "#4f46e5" },
    "upcoming-ic":  { bg: "rgba(139,92,246,0.12)",  border: "rgba(139,92,246,0.3)",  color: "#c4b5fd", cpColor: "#7c3aed" },
  };
  const s = styles[variant] || styles["upcoming-reg"];
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 3,
      background: s.bg, border: `1px solid ${s.border}`,
      borderRadius: 5, padding: "2px 7px",
      fontFamily: "'IBM Plex Mono', monospace",
      color: s.color, whiteSpace: "nowrap", fontSize: 11
    }}>
      {label} <span style={{ color: s.cpColor, fontSize: 9 }}>({cp})</span>
    </span>
  );
}

const selStyle = {
  background: "rgba(255,255,255,0.05)", border: "1px solid rgba(255,255,255,0.1)",
  borderRadius: 6, padding: "5px 9px", color: "#cbd5e1", fontSize: 11, cursor: "pointer", outline: "none"
};
const th = { padding: "8px 12px", textAlign: "left", fontSize: 10, color: "#64748b", fontWeight: 500, textTransform: "uppercase", letterSpacing: "0.07em", whiteSpace: "nowrap" };
const td = { padding: "6px 12px", verticalAlign: "middle" };


  </script>

  <script type="text/babel">
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>

</body>
